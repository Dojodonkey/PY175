{% extends "layout.html" %}

{% block content %}
  <ul>
    {% for file in files %}
    <li>
      <a href="{{ url_for('file_content', file_title = file) }}">{{ file }}</a>
      <a href="{{ url_for('edit_content', file_title = file) }}">Edit</a>
      <form class="inline" method="post"
      action="{{ url_for('delete_file', file_title=file) }}">
        <button type="submit">Delete</button>
      </form>
    </li>
    {% endfor %}
  </ul>
  <div>
    <a href="{{ url_for('new_file') }}">New Document</a>
  </div>

  <!--Sign In Relevant:-->
  {% if session.username %}
    <form method="post" action="{{ url_for('signout') }}">
      <p>Signed in as {{ session.username }}.
      <button type="submit">Sign Out</button>
      </p>
    </form>
  {% else %}
    <p class="user-status"><a href="{{ url_for('show_signin') }}">
      Sign In </a></p>
  {% endif %}
{% endblock %}
